# =============================================================================
# Site-wide configuration for brianfschaffner.com (Jekyll / academicpages)
# =============================================================================

# --- Basic site settings -----------------------------------------------------
locale                   : "en-US"
site_theme               : "default"   # options: default, air, sunrise, mint, dirt, contrast
title                    : "Brian F. Schaffner"
title_separator          : "|"
name                     : &name "Brian F. Schaffner"
description              : &description "Newhouse Professor of Civic Studies at Tufts University. Public opinion, campaigns, elections, race, and prejudice in American politics."
url                      : "https://brianfschaffner.com"
baseurl                  : ""
repository               : "bfschaffner/bfschaffner.github.io"
google_scholar_stats_use_cdn : true
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false
atom_feed:
  hide                   : false
  path                   :
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : false

# --- SEO --------------------------------------------------------------------
twitter:
  username               : &twitter ""
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "/images/profile.png"
social:
  type                   : Person
  name                   : *name
  links:
    - "https://scholar.google.com/citations?user=s13IQeUAAAAJ"
    - "https://orcid.org/0000-0003-1953-2464"
    - "https://en.wikipedia.org/wiki/Brian_Schaffner"
    - "https://github.com/bfschaffner"
    - "https://bsky.app/profile/bfschaffner.bsky.social"
    - "https://www.linkedin.com/in/brian-schaffner-34b3aa65/"

# --- Analytics --------------------------------------------------------------
analytics:
  provider               : false   # set to "google-gtag" and add tracking id below if desired
  google:
    tracking_id          :

# --- Reading files ----------------------------------------------------------
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
  - /vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# --- Conversion -------------------------------------------------------------
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

# --- Markdown processing ----------------------------------------------------
kramdown:
  input                  : GFM
  hard_wrap              : false
  auto_ids               : true
  footnote_nr            : 1
  entity_output          : as_char
  toc_levels             : 1..6
  smart_quotes           : lsquo,rsquo,ldquo,rdquo
  enable_coderay         : false

# --- Sass / SCSS ------------------------------------------------------------
sass:
  sass_dir               : _sass
  style                  : compressed

# --- Outputting -------------------------------------------------------------
permalink                : /:categories/:title/
paginate                 : 5
paginate_path            : /page:num/
timezone                 : America/New_York

# --- Plugins ----------------------------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

# --- Author profile (sidebar on every page) ---------------------------------
author:
  avatar           : "profile.png"   # placed in /images/
  name             : "Brian F. Schaffner"
  pronouns         :
  bio              : "Newhouse Professor of Civic Studies, Tufts University"
  location         : "Medford, MA"
  employer         : "Tufts University"
  uri              :
  email            : "brian.schaffner@tufts.edu"
  orcid            : "https://orcid.org/0000-0003-1953-2464"
  googlescholar    : "https://scholar.google.com/citations?user=s13IQeUAAAAJ"
  github           : "bfschaffner"
  bluesky          : "bfschaffner.bsky.social"
  linkedin         : "brian-schaffner-34b3aa65"
  wikipedia        : "https://en.wikipedia.org/wiki/Brian_Schaffner"
  # The following intentionally left blank - fill in if you use these:
  twitter          :
  mastodon         :

# --- Site Author (footer) ---------------------------------------------------
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:brian.schaffner@tufts.edu"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=AICYwloAAAAJ"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/bfschaffner"
    - label: "Bluesky"
      icon: "fa-brands fa-bluesky"
      url: "https://bsky.app/profile/brianfschaffner.com"

# --- Defaults ---------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false

# --- Collections ------------------------------------------------------------
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
